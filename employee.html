<script>
const database = {
  "GWH·2024·0042": {
    id: 'GR015',
    name: 'Tanu Sharma',
    role: 'Business Development Executive',
    department: 'Sales & Marketing',
    phone: '+91 9284428173',
    email: 'sales@greywood.in',
    office: '12, Block 38/4B, Friends Centre, Sanjay Place, Agra – 282002, UP',
  }
};

function getIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function downloadCSV(data) {
  const rows = [
    ['Field','Value'],
    ['Employee ID', data.id],
    ['Name', data.name],
    ['Role', data.role],
    ['Department', data.department],
    ['Phone', data.phone],
    ['Email', data.email],
    ['Office', data.office],
    ['Valid', data.valid]
  ];

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = `${data.id.replace(/[^a-zA-Z0-9]+/g,'_')}.csv`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

window.onload = function () {
  const id = getIdFromURL();

  if (database[id]) {
    downloadCSV(database[id]);
  } else {
    document.body.innerHTML = "Invalid Employee ID";
  }
};
</script>
